<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons8-garnish-lineal-16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garnish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      try {
        var t = localStorage.getItem('garnish-theme') || 'ember';
        var m = localStorage.getItem('garnish-mode');
        document.documentElement.setAttribute('data-theme', t);
        if (m === 'dark') document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
